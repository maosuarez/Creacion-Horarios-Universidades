name: Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "backend/**"

jobs:
  backend-tests:
    name: Backend Tests (FastAPI/Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      ENV: "test"
      SECRET_KEY: "clave-segura-test"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -vv --maxfail=1 --disable-warnings --junitxml=report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit-report
          path: backend/report.xml

  frontend-lint:
    name: Frontend Lint (Next.js/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
